<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Customization - FurnitureMart</title>
    <link rel="stylesheet" href="cust.css">
</head>
<body>
    <header>
        <a href="index.html">← Back to Home</a>
        <h1>Design Your Custom Furniture</h1>
    </header>

    <div class="customization-container">
        <form id="customization-form">
            <div class="form-group">
                <label for="furniture-type">Furniture Type:</label>
                <select id="furniture-type" required>
                    <option value="sofa">Sofa</option>
                    <option value="chair">Chair</option>
                    <option value="table">Table</option>
                    <option value="bed">Bed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dimensions">Dimensions (LxWxH):</label>
                <input type="text" id="dimensions" placeholder="e.g., 200x100x75 cm" required>
            </div>

            <div class="form-group">
                <label for="material">Material:</label>
                <select id="material" required>
                    <option value="wood">Wood</option>
                    <option value="metal">Metal</option>
                    <option value="fabric">Fabric</option>
                    <option value="leather">Leather</option>
                </select>
            </div>

            <div class="form-group">
                <label for="finish">Finish:</label>
                <select id="finish" required>
                    <option value="matte">Matte</option>
                    <option value="glossy">Glossy</option>
                    <option value="satin">Satin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pattern">Fabric Pattern:</label>
                <select id="pattern" required>
                    <option value="solid">Solid</option>
                    <option value="striped">Striped</option>
                    <option value="checked">Checked</option>
                    <option value="floral">Floral</option>
                </select>
            </div>

            <div class="form-group">
                <label for="color">Color:</label>
                <input type="color" id="color" required>
            </div>

            <div class="form-group">
                <label for="additional-details">Additional Details:</label>
                <textarea id="additional-details" placeholder="Any specific requests or features"></textarea>
            </div>

            <button type="submit">Submit Customization</button>
        </form>
        <a href="cust-prod.html" class="view-customizations">View Saved Customizations</a>
    </div>

    <script src="cust.js"></script>
</body>
</html>
