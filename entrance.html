<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrance Page</title>
  <style>   
    body {
      margin: 0;
      padding: 0;
      background: url('images/Furniture Mart.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Arial', sans-serif;
    }

    .container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.4);
    }


    .section {
      width: 40%;
      background-color: rgba(255, 245, 214, 0.85);
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
      transition: transform 0.3s ease;
    }

    .section:hover {
      transform: translateY(-5px);
    }

    .section img {
      width: 100%;
      max-width: 300px;
      height: auto;
      border-radius: 10px;
    }

    .btn {
      background: linear-gradient(45deg, #1e90ff, #00bfff);
      border: none;
      color: white;
      padding: 15px 30px;
      text-transform: uppercase;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .section {
        width: 80%;
        margin: 15px 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Section: Admin Login -->
    <div class="section">
      <img src="images/admin.webp" alt="Admin Login" />
      <button class="btn" onclick="window.location.href='public/admin.html'">Admin Login</button>
    </div>

    <!-- Right Section: Customer Login -->
    <div class="section">
      <img src="images/customer.webp" alt="Customer Login" />
      <button class="btn" onclick="window.location.href='login.html'">Customer Login</button>
    </div>
  </div>
</body>
</html>
