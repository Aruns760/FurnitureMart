<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - FurnitureMart</title>
    <link rel="stylesheet" href="add-user.css">
</head>
<body>
    <header>
        <h1>Add New User</h1>
    </header>

    <div class="container">
        <button class="back-btn" onclick="goBack()">Back to Manage Users</button>

        <form id="addUserForm" class="user-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="submit-btn">Add User</button>
        </form>

        <p id="message"></p>
    </div>

    <script>
        const form = document.getElementById('addUserForm');
        const message = document.getElementById('message');
        const token = localStorage.getItem('token');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const userData = {
                name: form.name.value,
                email: form.email.value,
                phone: form.phone.value,
                password: form.password.value
            };

            fetch('http://localhost:3000/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(userData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    message.textContent = 'User added successfully!';
                    message.style.color = 'green';
                    form.reset();
                } else {
                    message.textContent = data.message || 'Failed to add user';
                    message.style.color = 'red';
                }
            })
            .catch(error => {
                message.textContent = 'Error adding user';
                message.style.color = 'red';
                console.error('Error:', error);
            });
        });

        function goBack() {
            window.location.href = 'manage-users.html';
        }
    </script>
</body>
</html>
