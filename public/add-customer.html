html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Customer - FurnitureMart</title>
    <link rel="stylesheet" href="add-customer.css">
</head>
<body>

<header>
    <h1>Add Customer</h1>
    <a href="admin-dashboard.html" class="back-btn">Back to Dashboard</a>
</header>

<div class="form-container">
    <form id="add-customer-form">
        <div class="form-group">
            <label for="customer-name">Customer Name</label>
            <input type="text" id="customer-name" name="customer-name" required>
        </div>

        <div class="form-group">
            <label for="customer-email">Customer Email</label>
            <input type="email" id="customer-email" name="customer-email" required>
        </div>

        <button type="submit" class="submit-btn">Add Customer</button>
    </form>

    <div id="message" class="message"></div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api/users';

    document.getElementById('add-customer-form').addEventListener('submit', function (e) {
        e.preventDefault();

        const customerName = document.getElementById('customer-name').value;
        const customerEmail = document.getElementById('customer-email').value;

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: customerName, email: customerEmail })
        })
        .then(response => response.json())
        .then(data => {
            if (data.message === 'Customer added successfully') {
                alert('Customer added successfully!');
                window.location.href = 'manage-orders.html';
            } else {
                alert(data.message);
            }
        })
        .catch(error => {
            console.error('Error adding customer:', error);
            alert('Failed to add customer. Please try again.');
        });
    });
</script>

</body>
</html>
