<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - FurnitureMart</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <header>
        <h1>Manage Users</h1>
        <button class="logout" onclick="logout()">Logout</button>
    </header>

    <div class="container">
        <div class="action-buttons">
            <button class="back-btn" onclick="goBack()">Back to Dashboard</button>
            <button class="action-btn" onclick="addUser()">Add User</button>
        </div>

        <table class="user-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="user-list">
                <!-- Users will be dynamically loaded here -->
            </tbody>
        </table>
    </div>

    <script>
        const token = localStorage.getItem('token');

        function loadUsers() {
            fetch('http://localhost:3000/api/users', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (!response.ok) {
                    if (response.status === 401) {
                        alert('Session expired. Please log in again.');
                        logout();
                    }
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('User data:', data); // Log the response data

                const userList = document.getElementById('user-list');
                userList.innerHTML = '';

                if (!data || data.length === 0) {
                    userList.innerHTML = '<tr><td colspan="5">No users found</td></tr>';
                    return;
                }

                data.forEach(user => {
                    console.log('User object:', user); // Log each user object

                    const userId = user.id || user._id || 'N/A';
                    const userName = user.username || user.fullName || 'N/A';
                    const userEmail = user.email || 'N/A';
                    const userRole = user.role || user.userRole || 'ADMIN';

                    const userRow = document.createElement('tr');
                    userRow.innerHTML = `
                        <td>${userId}</td>
                        <td>${userName}</td>
                        <td>${userEmail}</td>
                        <td>${userRole}</td>
                        <td>
                            <button class="action-btn" onclick="editUser('${userId}')">Edit</button>
                            <button class="action-btn" onclick="confirmDelete('${userId}')">Delete</button>
                        </td>
                    `;
                    userList.appendChild(userRow);
                });
            })  
            .catch(error => {
                console.error('Error loading users:', error);
                alert('Failed to load users. Check the console for details.');
            });
        }

        function goBack() {
            window.location.href = 'admin-dashboard.html';
        }

        function addUser() {
            window.location.href = 'add-user.html';
        }

        function editUser(userId) {
            window.location.href = `edit-user.html?id=${userId}`;
        }

        function confirmDelete(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                deleteUser(userId);
            }
        }

        function deleteUser(userId) {
            fetch(`http://localhost:3000/api/users/${userId}`, {
                method: 'DELETE',
                headers: { 
                    'Authorization': `Bearer ${token}` 
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                alert('User deleted successfully');
                loadUsers();
            })
            .catch(error => {
                console.error('Error deleting user:', error);
                alert('Failed to delete user. Check the console for details.');
            });
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'admin.html';
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
