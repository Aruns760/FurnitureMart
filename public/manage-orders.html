<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - FurnitureMart</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Button styles */
        .delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .delete-btn:hover {
            background-color: #cc0000;
        }
        .action-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .action-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <header>
        <h1>Manage Orders</h1>
        <button class="logout" onclick="logout()">Logout</button>
    </header>

    <div class="container">
        <div class="action-buttons">
            <button class="back-btn" onclick="goBack()">Back to Dashboard</button>
            <button class="action-btn" onclick="addOrder()">Add Order</button>
        </div>

        <div class="table-container">
            <table class="order-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customers</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Total Price</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Updated At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="order-list">
                    <!-- Orders will be populated dynamically here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/orders';
        const token = localStorage.getItem('token');

        // Load orders from the backend
        async function loadOrders() {
            try {
                const response = await fetch(API_URL, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Failed to fetch orders. Status: ${response.status}`);
                }
                const orders = await response.json();
                console.log('Orders:', orders); // Debug log
                const orderList = document.getElementById('order-list');
                orderList.innerHTML = '';

                if (!orders || orders.length === 0) {
                    orderList.innerHTML = '<tr><td colspan="9">No orders found</td></tr>';
                    return;
                }
                orders.forEach(order => {
    console.log('Order object:', order); // Log each order object
    const row = `
        <tr>
            <td>${order._id || 'N/A'}</td>
            <td>${order.customer || 'N/A'}</td>
            <td>${order.product?.name || 'N/A'}</td>
            <td>${order.quantity || 0}</td>
            <td>$${order.totalPrice || 0}</td>
            <td>${order.status || 'bending'}</td>
            <td>${order.createdAt ? new Date(order.createdAt).toLocaleDateString() : 'Invalid Date'}</td>
            <td>${order.updatedAt ? new Date(order.updatedAt).toLocaleDateString() : 'Invalid Date'}</td>
            <td>
                <button class="action-btn" onclick="editOrder('${order._id}')">Edit</button>
                <button class="delete-btn" onclick="deleteOrder('${order._id}')">Delete</button>
            </td>
        </tr>
    `;
    orderList.innerHTML += row;
});

            } catch (error) {
                console.error('Error loading orders:', error);
                alert('Failed to load orders. Please try again.');
            }
        }

        // Navigate back to the dashboard
        function goBack() {
            window.location.href = 'admin-dashboard.html';
        }

        // Navigate to add order page
        function addOrder() {
            window.location.href = 'add-order.html';
        }

        // Navigate to edit order page
        function editOrder(orderId) {
            window.location.href = `edit-order.html?id=${orderId}`;
        }

        // Delete an order
        function deleteOrder(orderId) {
            if (confirm('Are you sure you want to delete this order?')) {
                fetch(`${API_URL}/${orderId}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => {
                    if (!response.ok) throw new Error(`Failed to delete order. Status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    alert(data.message || 'Order deleted successfully');
                    loadOrders();
                })
                .catch(error => {
                    console.error('Error deleting order:', error);
                    alert('Failed to delete order. Please try again.');
                });
            }
        }

        // Logout and clear token
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'admin.html';
        }

        // Load orders on page load
        window.onload = loadOrders;
    </script>
</body>
</html>
